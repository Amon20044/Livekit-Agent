services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.local.yaml:/etc/livekit.yaml
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  agent:
    build: .
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      - livekit
