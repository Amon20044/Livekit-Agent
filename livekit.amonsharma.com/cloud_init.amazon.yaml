#cloud-config
repo_update: true
repo_upgrade: all

bootcmd:
  - mkdir -p /opt/livekit/caddy_data
  - mkdir -p /usr/local/bin
  - mkdir -p /usr/libexec/docker/cli-plugins

write_files:
  - path: /opt/livekit/livekit.yaml
    content: |
      port: 7880
      bind_addresses:
        - ""
      rtc:
        tcp_port: 7881
        port_range_start: 50000
        port_range_end: 60000
        use_external_ip: true
        enable_loopback_candidate: false
      redis:
        address: localhost:6379
        username: ""
        password: ""
        db: 0
        use_tls: false
        sentinel_master_name: ""
        sentinel_username: ""
        sentinel_password: ""
        sentinel_addresses: []
        cluster_addresses: []
        max_redirects: null
      turn:
        enabled: true
        domain: turn-livekit.amonsharma.com
        tls_port: 5349
        udp_port: 3478
        external_tls: true
      keys:
        APIFmXGKZsHWkcA: dP5KujdtOXxTKXU4E5ko56t22gvGfoqk5DXcZOkuafE

  - path: /opt/livekit/caddy.yaml
    content: |
      logging:
        logs:
          default:
            level: INFO
      storage:
        module: file_system
        root: /data
      apps:
        tls:
          certificates:
            automate:
              - livekit.amonsharma.com
              - turn-livekit.amonsharma.com
        layer4:
          servers:
            main:
              listen: [":443"]
              routes:
                - match:
                    - tls:
                        sni:
                          - "turn-livekit.amonsharma.com"
                  handle:
                    - handler: tls
                    - handler: proxy
                      upstreams:
                        - dial: ["localhost:5349"]
                - match:
                    - tls:
                        sni:
                          - "livekit.amonsharma.com"
                  handle:
                    - handler: tls
                      connection_policies:
                        - alpn: ["http/1.1"]
                    - handler: proxy
                      upstreams:
                        - dial: ["localhost:7880"]

  - path: /opt/livekit/update_ip.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      ip=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)
      if [ -n "$ip" ]; then
        sed -i "s/localhost:5349/$ip:5349/g" /opt/livekit/caddy.yaml
      fi

  - path: /opt/livekit/docker-compose.yaml
    content: |
      services:
        caddy:
          image: livekit/caddyl4
          command: run --config /etc/caddy.yaml --adapter yaml
          restart: unless-stopped
          network_mode: host
          volumes:
            - ./caddy.yaml:/etc/caddy.yaml
            - ./caddy_data:/data

        livekit:
          image: livekit/livekit-server:latest
          command: --config /etc/livekit.yaml
          restart: unless-stopped
          network_mode: host
          volumes:
            - ./livekit.yaml:/etc/livekit.yaml

        redis:
          image: redis:7-alpine
          command: redis-server /etc/redis.conf
          restart: unless-stopped
          network_mode: host
          volumes:
            - ./redis.conf:/etc/redis.conf

  - path: /opt/livekit/redis.conf
    content: |
      bind 127.0.0.1 ::1
      protected-mode yes
      port 6379
      timeout 0
      tcp-keepalive 300

  - path: /opt/livekit/sip.yaml
    content: |
      api_key: APIFmXGKZsHWkcA
      api_secret: dP5KujdtOXxTKXU4E5ko56t22gvGfoqk5DXcZOkuafE
      ws_url: ws://localhost:7880
      redis:
        address: localhost:6379
      sip_port: 5060
      rtp_port: 10000-20000
      use_external_ip: true
      logging:
        level: debug

  - path: /etc/systemd/system/livekit-docker.service
    content: |
      [Unit]
      Description=LiveKit Server Container
      After=docker.service
      Requires=docker.service

      [Service]
      LimitNOFILE=500000
      Restart=always
      WorkingDirectory=/opt/livekit
      ExecStartPre=/usr/bin/docker compose -f docker-compose.yaml down
      ExecStart=/usr/bin/docker compose -f docker-compose.yaml up
      ExecStop=/usr/bin/docker compose -f docker-compose.yaml down

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/livekit-sip.service
    content: |
      [Unit]
      Description=LiveKit SIP Server
      After=network.target docker.service livekit-docker.service
      Requires=docker.service livekit-docker.service

      [Service]
      Restart=always
      ExecStart=/usr/local/bin/livekit-sip --config /opt/livekit/sip.yaml
      ExecStop=/bin/kill -s SIGINT $MAINPID
      LimitNOFILE=500000

      [Install]
      WantedBy=multi-user.target

runcmd:
  - dnf install -y docker
  - systemctl enable docker
  - systemctl start docker
  - curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/libexec/docker/cli-plugins/docker-compose
  - chmod +x /usr/libexec/docker/cli-plugins/docker-compose
  - curl -L https://github.com/livekit/sip/releases/latest/download/livekit-sip-linux-amd64 -o /usr/local/bin/livekit-sip
  - chmod +x /usr/local/bin/livekit-sip
  - /opt/livekit/update_ip.sh
  - systemctl daemon-reload
  - systemctl enable livekit-docker
  - systemctl start livekit-docker
  - systemctl enable livekit-sip
  - systemctl start livekit-sip