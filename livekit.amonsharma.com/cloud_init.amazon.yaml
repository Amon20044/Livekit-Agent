#cloud-config
# LiveKit self-hosted setup for Amazon Linux (EC2)
# Used as user-data to bootstrap a fresh instance
repo_update: true
repo_upgrade: all

packages:
  - docker

bootcmd:
  - mkdir -p /opt/livekit/caddy_data
  - mkdir -p /usr/local/bin

write_files:
  - path: /opt/livekit/livekit.yaml
    content: |
      port: 7880
      bind_addresses:
        - ""
      rtc:
        tcp_port: 7881
        port_range_start: 50000
        port_range_end: 60000
        use_external_ip: true
        enable_loopback_candidate: false
      redis:
        address: localhost:6379
        username: ""
        password: ""
        db: 0
        use_tls: false
        sentinel_master_name: ""
        sentinel_username: ""
        sentinel_password: ""
        sentinel_addresses: []
        cluster_addresses: []
        max_redirects: null
      turn:
        enabled: true
        domain: turn-livekit.amonsharma.com
        tls_port: 5349
        udp_port: 3478
        external_tls: true
      keys:
        APIFmXGKZsHWkcA: dP5KujdtOXxTKXU4E5ko56t22gvGfoqk5DXcZOkuafE

  - path: /opt/livekit/caddy.yaml
    content: |
      logging:
        logs:
          default:
            level: INFO
      storage:
        module: file_system
        root: /data
      apps:
        tls:
          certificates:
            automate:
              - livekit.amonsharma.com
              - turn-livekit.amonsharma.com
        layer4:
          servers:
            main:
              listen: [":443"]
              routes:
                - match:
                    - tls:
                        sni:
                          - "turn-livekit.amonsharma.com"
                  handle:
                    - handler: tls
                    - handler: proxy
                      upstreams:
                        - dial: ["localhost:5349"]
                - match:
                    - tls:
                        sni:
                          - "livekit.amonsharma.com"
                  handle:
                    - handler: tls
                      connection_policies:
                        - alpn: ["http/1.1"]
                    - handler: proxy
                      upstreams:
                        - dial: ["localhost:7880"]

  - path: /opt/livekit/update_ip.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      ip=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)
      if [ -z "$ip" ]; then
        ip=$(ip addr show | grep "inet " | grep -v 127.0.0. | head -1 | cut -d" " -f6 | cut -d/ -f1)
      fi
      if [ -n "$ip" ]; then
        sed -i "s/localhost:5349/$ip:5349/g" /opt/livekit/caddy.yaml
      fi

  - path: /opt/livekit/docker-compose.yaml
    content: |
      services:
        caddy:
          image: livekit/caddyl4
          command: run --config /etc/caddy.yaml --adapter yaml
          restart: unless-stopped
          network_mode: host
          volumes:
            - ./caddy.yaml:/etc/caddy.yaml
            - ./caddy_data:/data

        livekit:
          image: livekit/livekit-server:v1.9.3
          command: --config /etc/livekit.yaml
          restart: unless-stopped
          network_mode: host
          volumes:
            - ./livekit.yaml:/etc/livekit.yaml

        redis:
          image: redis:7-alpine
          command: redis-server /etc/redis.conf
          restart: unless-stopped
          network_mode: host
          volumes:
            - ./redis.conf:/etc/redis.conf

        sip:
          image: livekit/sip
          restart: unless-stopped
          network_mode: host
          environment:
            SIP_CONFIG_BODY: |
              api_key: APIFmXGKZsHWkcA
              api_secret: dP5KujdtOXxTKXU4E5ko56t22gvGfoqk5DXcZOkuafE
              ws_url: ws://localhost:7880
              redis:
                address: localhost:6379
              sip_port: 5060
              rtp_port: 10000-20000
              use_external_ip: true
              logging:
                level: debug

  - path: /opt/livekit/redis.conf
    content: |
      bind 127.0.0.1 ::1
      protected-mode yes
      port 6379
      timeout 0
      tcp-keepalive 300

  - path: /etc/systemd/system/livekit-docker.service
    content: |
      [Unit]
      Description=LiveKit Server Container
      After=docker.service
      Requires=docker.service

      [Service]
      LimitNOFILE=500000
      Restart=always
      WorkingDirectory=/opt/livekit
      ExecStartPre=/usr/local/bin/docker-compose -f docker-compose.yaml down
      ExecStart=/usr/local/bin/docker-compose -f docker-compose.yaml up
      ExecStop=/usr/local/bin/docker-compose -f docker-compose.yaml down

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
  - chmod 755 /usr/local/bin/docker-compose
  - chmod 755 /opt/livekit/update_ip.sh
  - /opt/livekit/update_ip.sh
  - systemctl enable docker
  - systemctl start docker
  - systemctl enable livekit-docker
  - systemctl start livekit-docker
