name: Deploy Agent To EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        default: "main"
      env_file:
        description: "Path to env file on EC2"
        default: "/opt/my-agent/.env.local"
      ssh_port:
        description: "SSH port"
        default: "22"

env:
  APP_DIR: "/opt/my-agent"
  SSH_PORT: ${{ inputs.ssh_port || '22' }}
  ENV_FILE: ${{ inputs.env_file || '/opt/my-agent/.env.local' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.EC2_HOST }}" || { echo "Missing secret: EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "Missing secret: EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_PRIVATE_KEY }}" || { echo "Missing secret: EC2_PRIVATE_KEY"; exit 1; }

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf "%s\n" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Add EC2 host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Package repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude-vcs \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.ruff_cache' \
            --exclude='.pytest_cache' \
            --exclude='.cache' \
            -czf /tmp/my-agent.tar.gz .

      - name: Upload app bundle
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -P "${{ env.SSH_PORT }}" \
            /tmp/my-agent.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/my-agent.tar.gz"

      - name: Clean old agent and Docker state on EC2
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -euo pipefail

            # Install Docker if not present
            if ! command -v docker >/dev/null 2>&1; then
              sudo dnf install -y docker
              sudo systemctl enable docker
            fi
            sudo systemctl start docker

            # Install/upgrade docker-buildx plugin (compose build requires buildx >= 0.17.0)
            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            ARCH=\$(uname -m); case \$ARCH in x86_64) ARCH=amd64;; aarch64) ARCH=arm64;; esac
            sudo curl -fSL https://github.com/docker/buildx/releases/download/v0.22.0/buildx-v0.22.0.linux-\$ARCH \
              -o /usr/local/lib/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

            # Install docker-compose plugin if not present
            if ! sudo docker compose version >/dev/null 2>&1; then
              sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-\$(uname -m) \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # --- Tear down any existing compose project first ---
            echo '=== Tearing down existing compose project ==='
            if [ -f '${{ env.APP_DIR }}/docker-compose.local.yaml' ]; then
              cd '${{ env.APP_DIR }}'
              sudo docker compose -f docker-compose.local.yaml down --remove-orphans 2>/dev/null || true
              cd /
            fi

            # --- FULL CLEANUP: stop and remove ALL containers ---
            echo '=== Stopping all running containers ==='
            sudo docker stop \$(sudo docker ps -aq) 2>/dev/null || true
            echo '=== Removing all containers ==='
            sudo docker rm -f \$(sudo docker ps -aq) 2>/dev/null || true

            # --- Remove ALL Docker images ---
            echo '=== Removing all Docker images ==='
            sudo docker rmi -f \$(sudo docker images -aq) 2>/dev/null || true

            # --- Clear all Docker cache (build cache, volumes, networks) ---
            echo '=== Clearing Docker build cache ==='
            sudo docker builder prune -af 2>/dev/null || true
            echo '=== Docker system prune (includes networks) ==='
            sudo docker system prune -af --volumes 2>/dev/null || true
            sudo docker network prune -f 2>/dev/null || true

            # --- Stop any host-level livekit service and kill processes on LiveKit ports ---
            echo '=== Stopping host-level livekit services ==='
            sudo systemctl stop livekit 2>/dev/null || true
            sudo systemctl stop livekit-server 2>/dev/null || true
            sudo systemctl disable livekit 2>/dev/null || true
            sudo systemctl disable livekit-server 2>/dev/null || true
            sudo pkill -f livekit-server 2>/dev/null || true
            sudo pkill -f livekit 2>/dev/null || true

            echo '=== Freeing LiveKit ports (7880, 7881) ==='
            for port in 7880 7881; do
              pid=\$(sudo ss -tlnp sport = :\$port | grep -oP 'pid=\K[0-9]+' | head -1)
              if [ -n \"\$pid\" ]; then
                echo \"Killing PID \$pid on port \$port\"
                sudo kill -9 \$pid 2>/dev/null || true
              fi
            done
            sleep 2
            echo '=== Verifying ports are free ==='
            sudo ss -tlnp sport = :7880 sport = :7881 || true

            # --- Wipe old app directory completely ---
            echo '=== Removing old app directory ==='
            # Preserve env file
            if [ -f '${{ env.ENV_FILE }}' ]; then
              cp '${{ env.ENV_FILE }}' /tmp/my-agent-env.bak
            fi
            sudo rm -rf '${{ env.APP_DIR }}'

            echo '=== Cleanup complete ==='
          "

      - name: Deploy and start with docker compose
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -euo pipefail

            # Create fresh app directory and extract code
            sudo mkdir -p '${{ env.APP_DIR }}'
            sudo tar -xzf /tmp/my-agent.tar.gz -C '${{ env.APP_DIR }}'
            sudo chown -R '${{ secrets.EC2_USER }}':'${{ secrets.EC2_USER }}' '${{ env.APP_DIR }}'

            # Restore env file
            if [ -f /tmp/my-agent-env.bak ]; then
              sudo mv /tmp/my-agent-env.bak '${{ env.ENV_FILE }}'
            fi

            cd '${{ env.APP_DIR }}'

            # Ensure LIVEKIT_URL, API_KEY, and API_SECRET are set in the env file
            if [ -f '${{ env.ENV_FILE }}' ]; then
              sed -i '/^LIVEKIT_URL=/d' '${{ env.ENV_FILE }}'
              sed -i '/^LIVEKIT_API_KEY=/d' '${{ env.ENV_FILE }}'
              sed -i '/^LIVEKIT_API_SECRET=/d' '${{ env.ENV_FILE }}'
            fi
            echo 'LIVEKIT_URL=ws://livekit:7880' >> '${{ env.ENV_FILE }}'
            echo 'LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}' >> '${{ env.ENV_FILE }}'
            echo 'LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}' >> '${{ env.ENV_FILE }}'

            # Build and start all services (livekit, redis, agent) via compose
            sudo docker compose -f docker-compose.local.yaml build --no-cache
            sudo docker compose -f docker-compose.local.yaml up -d

            echo '=== Services started ==='
            sudo docker compose -f docker-compose.local.yaml ps
          "

      - name: Show last logs
        if: ${{ always() }}
        shell: bash
        run: |
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            cd '${{ env.APP_DIR }}'
            echo '=== Agent logs ==='
            sudo docker compose -f docker-compose.local.yaml logs --tail 80 agent 2>/dev/null || echo 'No agent logs yet.'
            echo '=== LiveKit logs ==='
            sudo docker compose -f docker-compose.local.yaml logs --tail 20 livekit 2>/dev/null || echo 'No livekit logs yet.'
          "
