name: Deploy Agent To EC2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-ec2.yml"

env:
  APP_DIR: "/opt/my-agent"
  SSH_PORT: "22"
  ENV_FILE: "/etc/my-agent.env"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.EC2_HOST }}" || { echo "Missing secret: EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "Missing secret: EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_PRIVATE_KEY }}" || { echo "Missing secret: EC2_PRIVATE_KEY"; exit 1; }

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf "%s\n" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Add EC2 host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Package repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude-vcs \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.ruff_cache' \
            --exclude='.pytest_cache' \
            -czf /tmp/my-agent.tar.gz .

      - name: Upload app bundle and startup script
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -P "${{ env.SSH_PORT }}" /tmp/my-agent.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/my-agent.tar.gz"
          scp -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -P "${{ env.SSH_PORT }}" scripts/ec2/start_agent_worker.sh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/start_agent_worker.sh"

      - name: Deploy and start worker on EC2
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -euo pipefail
            chmod +x /tmp/start_agent_worker.sh
            sudo mkdir -p '${{ env.APP_DIR }}'
            sudo tar -xzf /tmp/my-agent.tar.gz -C '${{ env.APP_DIR }}'
            APP_DIR='${{ env.APP_DIR }}' BRANCH='${{ github.ref_name }}' REPO_URL='' ENV_FILE='${{ env.ENV_FILE }}' /tmp/start_agent_worker.sh
          "

      - name: Show last logs
        if: ${{ always() }}
        shell: bash
        run: |
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -euo pipefail
            if [ -f '${{ env.APP_DIR }}/logs/agent.log' ]; then
              tail -n 80 '${{ env.APP_DIR }}/logs/agent.log'
            else
              echo 'No agent log file found yet.'
            fi
          "
