name: Deploy Agent To EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        default: "main"
      env_file:
        description: "Path to env file on EC2"
        default: "/opt/my-agent/.env.local"
      ssh_port:
        description: "SSH port"
        default: "22"

env:
  APP_DIR: "/opt/my-agent"
  SSH_PORT: ${{ inputs.ssh_port || '22' }}
  ENV_FILE: ${{ inputs.env_file || '/opt/my-agent/.env.local' }}
  IMAGE_NAME: "my-agent"
  CONTAINER_NAME: "my-agent"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.EC2_HOST }}" || { echo "Missing secret: EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "Missing secret: EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_PRIVATE_KEY }}" || { echo "Missing secret: EC2_PRIVATE_KEY"; exit 1; }

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf "%s\n" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Add EC2 host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Package repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude-vcs \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.ruff_cache' \
            --exclude='.pytest_cache' \
            --exclude='.cache' \
            -czf /tmp/my-agent.tar.gz .

      - name: Upload app bundle
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -P "${{ env.SSH_PORT }}" \
            /tmp/my-agent.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/my-agent.tar.gz"

      - name: Deploy agent on EC2
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -euo pipefail

            # --- Only remove the agent container and its image ---
            echo '=== Removing old agent container ==='
            sudo docker stop '${{ env.CONTAINER_NAME }}' 2>/dev/null || true
            sudo docker rm -f '${{ env.CONTAINER_NAME }}' 2>/dev/null || true
            sudo docker rmi -f '${{ env.IMAGE_NAME }}' 2>/dev/null || true
            sudo docker builder prune -af 2>/dev/null || true

            # --- Fresh code ---
            if [ -f '${{ env.ENV_FILE }}' ]; then
              cp '${{ env.ENV_FILE }}' /tmp/my-agent-env.bak
            fi
            sudo rm -rf '${{ env.APP_DIR }}'
            sudo mkdir -p '${{ env.APP_DIR }}'
            sudo tar -xzf /tmp/my-agent.tar.gz -C '${{ env.APP_DIR }}'
            sudo chown -R '${{ secrets.EC2_USER }}':'${{ secrets.EC2_USER }}' '${{ env.APP_DIR }}'
            if [ -f /tmp/my-agent-env.bak ]; then
              sudo mv /tmp/my-agent-env.bak '${{ env.ENV_FILE }}'
            fi

            cd '${{ env.APP_DIR }}'

            # --- Ensure LIVEKIT_URL points to internal Docker network ---
            touch '${{ env.ENV_FILE }}'
            sed -i '/^LIVEKIT_URL=/d' '${{ env.ENV_FILE }}'
            echo 'LIVEKIT_URL=ws://livekit:7880' >> '${{ env.ENV_FILE }}'

            # --- Build agent image (no cache) ---
            sudo docker build --no-cache -t '${{ env.IMAGE_NAME }}' .

            # --- Find the Docker network where livekit is running ---
            LIVEKIT_CID=\$(sudo docker ps -qf name=livekit | head -1)
            if [ -n \"\$LIVEKIT_CID\" ]; then
              LIVEKIT_NET=\$(sudo docker inspect \"\$LIVEKIT_CID\" --format '{{range \$k, \$v := .NetworkSettings.Networks}}{{\$k}}{{end}}' 2>/dev/null | head -1)
            fi
            if [ -z \"\${LIVEKIT_NET:-}\" ]; then
              echo 'ERROR: No livekit container found. Cannot resolve ws://livekit:7880 without it.'
              sudo docker ps -a
              exit 1
            fi
            echo \"Joining network: \$LIVEKIT_NET\"

            # --- Run agent container on the same network as livekit ---
            sudo docker run -d \
              --name '${{ env.CONTAINER_NAME }}' \
              --network \"\$LIVEKIT_NET\" \
              --env-file '${{ env.ENV_FILE }}' \
              --restart unless-stopped \
              '${{ env.IMAGE_NAME }}'

            # --- Verify networking inside the container ---
            echo '=== Verifying agent can reach livekit ==='
            sleep 3
            sudo docker exec '${{ env.CONTAINER_NAME }}' python3 -c \"import socket; addr=socket.gethostbyname('livekit'); print('DNS OK: livekit ->', addr)\" \
              || { echo 'FAIL: livekit hostname does not resolve inside container'; exit 1; }
            sudo docker exec '${{ env.CONTAINER_NAME }}' python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('livekit',7880)); s.close(); print('TCP OK: livekit:7880 reachable')\" \
              || { echo 'FAIL: cannot connect to livekit:7880'; exit 1; }

            echo '=== Agent deployed ==='
            sudo docker ps --filter name='${{ env.CONTAINER_NAME }}'
          "

      - name: Wait for agent to register
        shell: bash
        run: |
          set -euo pipefail
          RESULT="FAIL"
          echo "Waiting for agent to register with LiveKit..."
          for i in $(seq 1 30); do
            if ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "sudo docker logs '${{ env.CONTAINER_NAME }}' 2>&1 | grep -q 'registered worker'"; then
              RESULT="SUCCESS"
              break
            fi
            echo "Attempt $i/30 - not yet registered, waiting 5s..."
            sleep 5
          done

          echo ""
          echo "========================================="
          echo "  DEPLOY RESULT: $RESULT"
          echo "========================================="
          echo ""
          echo "=== Container logs ==="
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo docker logs --tail 80 '${{ env.CONTAINER_NAME }}' 2>&1" || true
          echo ""
          echo "=== Container status ==="
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo docker ps -a --filter name='${{ env.CONTAINER_NAME }}'" || true

          if [ "$RESULT" = "FAIL" ]; then
            echo ""
            echo "Agent did not register within 150s."
            exit 1
          fi
