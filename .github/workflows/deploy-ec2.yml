name: Deploy Agent To EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        default: "main"
      env_file:
        description: "Path to env file on EC2"
        default: "/opt/my-agent/.env.local"
      ssh_port:
        description: "SSH port"
        default: "22"

env:
  APP_DIR: "/opt/my-agent"
  SSH_PORT: ${{ inputs.ssh_port || '22' }}
  ENV_FILE: ${{ inputs.env_file || '/opt/my-agent/.env.local' }}
  IMAGE_NAME: "my-agent"
  CONTAINER_NAME: "my-agent"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.EC2_HOST }}" || { echo "Missing secret: EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "Missing secret: EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_PRIVATE_KEY }}" || { echo "Missing secret: EC2_PRIVATE_KEY"; exit 1; }

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf "%s\n" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Add EC2 host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Package repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude-vcs \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.ruff_cache' \
            --exclude='.pytest_cache' \
            -czf /tmp/my-agent.tar.gz .

      - name: Upload app bundle
        shell: bash
        run: |
          set -euo pipefail
          scp -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -P "${{ env.SSH_PORT }}" \
            /tmp/my-agent.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/my-agent.tar.gz"

      - name: Build Docker image and start container on EC2
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -euo pipefail

            # Install Docker if not present
            if ! command -v docker >/dev/null 2>&1; then
              sudo dnf install -y docker
              sudo systemctl enable docker
            fi
            sudo systemctl start docker

            # Extract code
            sudo mkdir -p '${{ env.APP_DIR }}'
            sudo tar -xzf /tmp/my-agent.tar.gz -C '${{ env.APP_DIR }}'
            sudo chown -R '${{ secrets.EC2_USER }}':'${{ secrets.EC2_USER }}' '${{ env.APP_DIR }}'

            cd '${{ env.APP_DIR }}'

            # Remove any host .venv so it never leaks into the Docker build context
            rm -rf .venv

            # Build image from Dockerfile
            sudo docker build -t '${{ env.IMAGE_NAME }}' .

            # Replace running container with the new image
            sudo docker stop '${{ env.CONTAINER_NAME }}' 2>/dev/null || true
            sudo docker rm '${{ env.CONTAINER_NAME }}' 2>/dev/null || true
            sudo docker run -d \
              --name '${{ env.CONTAINER_NAME }}' \
              --env-file '${{ env.ENV_FILE }}' \
              --restart unless-stopped \
              '${{ env.IMAGE_NAME }}'

            echo 'Container started.'
            sudo docker ps --filter name='${{ env.CONTAINER_NAME }}'
          "

      - name: Show last logs
        if: ${{ always() }}
        shell: bash
        run: |
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -p "${{ env.SSH_PORT }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            sudo docker logs --tail 80 '${{ env.CONTAINER_NAME }}' 2>/dev/null || echo 'No container logs yet.'
          "
