name: Deploy Agent To EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        default: "main"
      ssh_port:
        description: "SSH port"
        default: "22"

env:
  APP_DIR: "/opt/my-agent"
  SSH_PORT: ${{ inputs.ssh_port || '22' }}
  ENV_FILE: "/opt/my-agent/.env.local"
  IMAGE_NAME: "my-agent"
  CONTAINER_NAME: "my-agent"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf "%s\n" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "${{ env.SSH_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        shell: bash
        timeout-minutes: 10
        run: |
          set -euo pipefail

          # Package only what Docker needs + env if present
          FILES="Dockerfile .dockerignore pyproject.toml uv.lock src/"
          if [ -f .env.encoded ]; then FILES="$FILES .env.encoded"; fi
          tar -czf /tmp/my-agent.tar.gz $FILES

          # Single SSH session: upload, build, run
          SSH="ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -p ${{ env.SSH_PORT }}"
          SCP="scp -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o ConnectTimeout=15 -C -P ${{ env.SSH_PORT }}"

          $SCP /tmp/my-agent.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/my-agent.tar.gz"

          $SSH "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -euo pipefail

            # Stop old agent
            sudo docker stop '${{ env.CONTAINER_NAME }}' 2>/dev/null || true
            sudo docker rm -f '${{ env.CONTAINER_NAME }}' 2>/dev/null || true

            # Free memory only when disk is low (< 1 GB free)
            FREE_KB=\$(df /var/lib/docker 2>/dev/null | awk 'NR==2{print \$4}' || echo 9999999)
            if [ \"\$FREE_KB\" -lt 1048576 ]; then
              echo 'Low disk — pruning docker images and build cache...'
              sudo docker rmi -f '${{ env.IMAGE_NAME }}' 2>/dev/null || true
              sudo docker image prune -f 2>/dev/null || true
              sudo docker builder prune -af 2>/dev/null || true
            fi

            # Extract new code over existing directory
            sudo mkdir -p '${{ env.APP_DIR }}'
            sudo tar -xzf /tmp/my-agent.tar.gz -C '${{ env.APP_DIR }}'
            sudo chown -R '${{ secrets.EC2_USER }}':'${{ secrets.EC2_USER }}' '${{ env.APP_DIR }}'
            rm -f /tmp/my-agent.tar.gz

            # Decrypt env file if .env.encoded was included, otherwise keep existing
            if [ -f '${{ env.APP_DIR }}/.env.encoded' ]; then
              openssl enc -aes-256-cbc -pbkdf2 -a -d \
                -in '${{ env.APP_DIR }}/.env.encoded' \
                -out '${{ env.ENV_FILE }}' \
                -pass pass:'${{ secrets.ENV_LOCAL_B64 }}'
              rm -f '${{ env.APP_DIR }}/.env.encoded'
            fi

            # Build and run
            cd '${{ env.APP_DIR }}'
            sudo docker build --no-cache -t '${{ env.IMAGE_NAME }}' .
            sudo docker run -d \
              --name '${{ env.CONTAINER_NAME }}' \
              --network host \
              --env-file '${{ env.ENV_FILE }}' \
              --restart unless-stopped \
              '${{ env.IMAGE_NAME }}'
          "

      - name: Wait for agent to register
        shell: bash
        timeout-minutes: 3
        run: |
          SSH="ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o ServerAliveInterval=10 -p ${{ env.SSH_PORT }}"
          RESULT="FAIL"
          REASON=""
          for i in $(seq 1 30); do
            LOGS=$($SSH "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "sudo docker logs '${{ env.CONTAINER_NAME }}' 2>&1" || true)

            if echo "$LOGS" | grep -q 'registered worker'; then
              RESULT="SUCCESS"
              break
            fi

            # Early fail: detect fatal errors instead of waiting the full timeout
            if echo "$LOGS" | grep -q 'exit code -9'; then
              REASON="OOM: process killed (exit code -9). Instance needs more memory."
              break
            fi
            if echo "$LOGS" | grep -q '401.*Invalid response status'; then
              REASON="AUTH: 401 Unauthorized. LIVEKIT_API_KEY/SECRET don't match the livekit server config."
              break
            fi
            if echo "$LOGS" | grep -q 'Connection refused'; then
              REASON="CONN: LiveKit server not reachable at ws://localhost:7880."
              break
            fi
            if ! $SSH "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "sudo docker ps -q --filter name='${{ env.CONTAINER_NAME }}' | grep -q ." 2>/dev/null; then
              REASON="CRASH: Container exited."
              break
            fi

            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done

          echo ""
          echo "========================================="
          if [ "$RESULT" = "SUCCESS" ]; then
            echo "  DEPLOY RESULT: SUCCESS"
          else
            echo "  DEPLOY RESULT: FAILED"
            if [ -n "$REASON" ]; then
              echo "  REASON: $REASON"
            else
              echo "  REASON: Agent did not register within timeout."
            fi
          fi
          echo "========================================="
          echo ""
          echo "=== Container logs ==="
          $SSH "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo docker logs --tail 40 '${{ env.CONTAINER_NAME }}' 2>&1" || true

          if [ "$RESULT" != "SUCCESS" ]; then
            exit 1
          fi

